{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Admin Login - EduResult{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 animate-fade">
        <div class="glass-card">
            <h2 class="text-center mb-4 nav-logo">Admin Secure Login</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn-primary w-100 py-3 mt-3">
                    <i class="fa-solid fa-right-to-bracket me-2"></i> Access Dashboard
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'home' %}" class="text-muted text-decoration-none small">
                    <i class="fa-solid fa-arrow-left me-1"></i> Back to Student Search
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
