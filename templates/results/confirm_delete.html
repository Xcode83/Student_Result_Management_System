{% extends 'base.html' %}

{% block title %}Confirm Delete - EduResult{% endblock %}

{% block content %}
<div class="row justify-content-center animate-fade">
    <div class="col-md-6 text-center">
        <div class="glass-card">
            <i class="fa-solid fa-triangle-exclamation fa-4x text-danger mb-4"></i>
            <h2 class="mb-3">Are you sure?</h2>
            <p class="text-muted mb-5">You are about to delete <strong>{{ object }}</strong>. This action cannot be undone.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <button type="submit" class="btn btn-danger px-5 py-2">
                        <i class="fa-solid fa-trash me-2"></i> Yes, Delete
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-light px-5 py-2">No, Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
